<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с клиентом</title>
    <link rel="stylesheet" href="client-chat.css">
</head>
<body>
    <main class="chat-page">
        <header class="chat-header">
            <a class="back-link" href="myorders.html">← Назад к заказам</a>
            <h1>Чат: Редизайн лендинга IT‑сервиса</h1>
            <p>Клиент: Nova Lab</p>
        </header>

        <section class="chat-window">
            <div class="message client">
                <p>Добрый день! Можно показать промежуточный вариант первого экрана?</p>
                <span>10:12</span>
            </div>
            <div class="message me">
                <p>Да, уже готовлю. Отправлю через 30 минут с вариантами по цветам.</p>
                <span>10:14</span>
            </div>
            <div class="message client">
                <p>Отлично, жду. И добавьте, пожалуйста, акцентную кнопку побольше.</p>
                <span>10:15</span>
            </div>
        </section>

        <form class="chat-form">
            <input type="text" placeholder="Введите сообщение..." aria-label="Сообщение">
            <button type="submit">Отправить</button>
        </form>
    </main>
</body>
</html>
